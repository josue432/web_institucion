<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Sistema de Gestión de Docentes</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<nav class="navbar">
<h2>Sistema Académico</h2>
</nav>

<div class="container">

<div class="form-card">

<h2>Registro de Docentes</h2>

<input type="hidden" id="editIndex">

<label>Tipo Documento</label>
<select id="tipoDoc">
<option value="">Seleccione</option>
<option value="C.C">C.C</option>
<option value="C.E">C.E</option>
<option value="TI">TI</option>
<option value="NIUP">NIUP</option>
</select>

<label>Nombre</label>
<input type="text" id="nombre">

<label>Apellido</label>
<input type="text" id="apellido">

<label>Fecha Nacimiento</label>
<input type="date" id="fecha">

<label>Nivel Estudios</label>
<select id="nivel">
<option value="">Seleccione</option>
<option value="Pregrado">Pregrado</option>
<option value="Maestría">Maestría</option>
<option value="Doctorado">Doctorado</option>
</select>

<label>Área</label>
<select id="area">
<option value="">Seleccione</option>
<option value="Matemáticas">Matemáticas</option>
<option value="Ciencias">Ciencias</option>
<option value="Sistemas">Sistemas</option>
</select>

<label>Grado</label>
<select id="grado">
<option value="">Seleccione</option>
<option value="Primer Semestre">Primer Semestre</option>
<option value="Segundo Semestre">Segundo Semestre</option>
<option value="Tercer Semestre">Tercer Semestre</option>
<option value="Cuarto Semestre">Cuarto Semestre</option>
</select>

<label>EPS</label>
<input type="text" id="eps">

<label>Salario</label>
<input type="number" id="salario">

<div class="botones">

<button onclick="guardarDocente()">Guardar</button>

<button onclick="cancelarEdicion()" class="cancelar">Cancelar</button>

</div>

</div>

<div class="tabla-card">

<h2>Lista de Docentes</h2>

<input type="text" id="busqueda" placeholder="Buscar docente..." onkeyup="filtrarDocentes()">

<table>

<thead>

<tr>
<th>Tipo</th>
<th>Nombre</th>
<th>Apellido</th>
<th>Fecha</th>
<th>Nivel</th>
<th>Área</th>
<th>Grado</th>
<th>EPS</th>
<th>Salario</th>
<th>Acciones</th>
</tr>

</thead>

<tbody id="tablaDocentes"></tbody>

</table>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
